<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <button id="room1">Join Room 1</button>
    <button id="room2">Join Room 2</button>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" />
      <button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Change connection to http long polling
      const socket = io({
        // auth: {
        //   token: 'your-authentication-token' // Replace with your actual token
        // }
      });
      let roomIdOfUser = ''; // Default room for the user

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      const room1Button = document.getElementById('room1');
      const room2Button = document.getElementById('room2');

      room1Button.addEventListener('click', () => {
        socket.emit('start_join_room', 'room1');
      });

      room2Button.addEventListener('click', () => {
        socket.emit('start_join_room', 'room2');
      });

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value) {
          socket.emit('send_message', {
            room: roomIdOfUser, // Use the current roomIdOfUser
            message: input.value
          });
          input.value = '';
        }
      });

      // If user joinned room then hide two buttons and display the room id of user
        socket.on('completed_join_room', (room) => {
            roomIdOfUser = room; // Update the roomIdOfUser variable when joining a room
            room1Button.style.display = 'none';
            room2Button.style.display = 'none';
            const roomInfo = document.createElement('p');
            roomInfo.textContent = `You have joined ${room}`;
            document.body.insertBefore(roomInfo, messages);
        });

      socket.on('receive_message', (msg) => {
        const item = document.createElement('li');
        item.textContent = msg;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });
    </script>
  </body>
</html>
